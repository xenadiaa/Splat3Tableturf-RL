<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720">
  <rect width="900" height="720" fill="rgb(248,249,245)"/>
  <text x="450" y="42" text-anchor="middle" font-size="28" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(20,20,20)">Map State 单帧采样权重示意</text>
  <text x="450" y="78" text-anchor="middle" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(70,70,70)">当前逻辑: 上方最高 -&gt; 中线约 0.3 -&gt; 底部更低</text>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgb(255,210,90)"/>
      <stop offset="50%" stop-color="rgb(150,130,60)"/>
      <stop offset="100%" stop-color="rgb(65,70,120)"/>
    </linearGradient>
  </defs>

  <rect x="250" y="140" width="400" height="460" rx="18" ry="18" fill="url(#grad)" stroke="rgb(55,55,55)" stroke-width="4"/>

  <g stroke="rgba(255,255,255,0.8)" stroke-width="1">
    <line x1="290" y1="140" x2="290" y2="600"/>
    <line x1="330" y1="140" x2="330" y2="600"/>
    <line x1="370" y1="140" x2="370" y2="600"/>
    <line x1="410" y1="140" x2="410" y2="600"/>
    <line x1="450" y1="140" x2="450" y2="600"/>
    <line x1="490" y1="140" x2="490" y2="600"/>
    <line x1="530" y1="140" x2="530" y2="600"/>
    <line x1="570" y1="140" x2="570" y2="600"/>
    <line x1="610" y1="140" x2="610" y2="600"/>
    <line x1="250" y1="180" x2="650" y2="180"/>
    <line x1="250" y1="220" x2="650" y2="220"/>
    <line x1="250" y1="260" x2="650" y2="260"/>
    <line x1="250" y1="300" x2="650" y2="300"/>
    <line x1="250" y1="340" x2="650" y2="340"/>
    <line x1="250" y1="380" x2="650" y2="380"/>
    <line x1="250" y1="420" x2="650" y2="420"/>
    <line x1="250" y1="460" x2="650" y2="460"/>
    <line x1="250" y1="500" x2="650" y2="500"/>
    <line x1="250" y1="540" x2="650" y2="540"/>
    <line x1="250" y1="580" x2="650" y2="580"/>
  </g>

  <circle cx="450" cy="370" r="85" fill="none" stroke="rgb(30,140,30)" stroke-width="5"/>

  <text x="145" y="160" text-anchor="middle" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(20,20,20)">上边缘</text>
  <text x="145" y="376" text-anchor="middle" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(20,20,20)">中线</text>
  <text x="145" y="590" text-anchor="middle" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(20,20,20)">下边缘</text>

  <line x1="185" y1="155" x2="235" y2="155" stroke="rgb(60,60,60)" stroke-width="3"/>
  <line x1="185" y1="370" x2="235" y2="370" stroke="rgb(60,60,60)" stroke-width="3"/>
  <line x1="185" y1="585" x2="235" y2="585" stroke="rgb(60,60,60)" stroke-width="3"/>

  <text x="740" y="160" text-anchor="middle" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(180,60,20)">≈ 1.0</text>
  <text x="740" y="376" text-anchor="middle" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(180,120,20)">≈ 0.3</text>
  <text x="740" y="590" text-anchor="middle" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(90,90,130)">≈ 0.08</text>

  <line x1="665" y1="155" x2="705" y2="155" stroke="rgb(60,60,60)" stroke-width="3"/>
  <line x1="665" y1="370" x2="705" y2="370" stroke="rgb(60,60,60)" stroke-width="3"/>
  <line x1="665" y1="585" x2="705" y2="585" stroke="rgb(60,60,60)" stroke-width="3"/>

  <text x="450" y="645" text-anchor="middle" font-size="20" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(30,110,30)">采样 patch / 圆圈所在区域</text>

  <text x="90" y="680" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(50,50,50)">1. 不是中心到边缘的径向加权, 而是按纵向行权重做上重下轻。</text>
  <text x="90" y="702" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(50,50,50)">2. 目的: 减弱下方已激活 special 的火焰/溢光对上方格子的污染。</text>
  <text x="90" y="724" font-size="16" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" fill="rgb(50,50,50)">3. 多帧模式里, 每一帧仍然先用这套单帧加权采样, 再做逐格投票。</text>
</svg>
